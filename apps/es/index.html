      const { createApp } = Vue;

      const escapeHtml = (value) =>
        String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");

      const applyInlineMarkdown = (value) => {
        return value
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
          .replace(/\*([^*]+)\*/g, "<em>$1</em>");
      };

      const renderMarkdown = (markdown) => {
        const lines = String(markdown || "").split("\n");
        const blocks = [];
        let paragraph = [];
        let listItems = [];

        const flushParagraph = () => {
          if (!paragraph.length) return;
          blocks.push("<p>" + paragraph.join("<br />") + "</p>");
          paragraph = [];
        };

        const flushList = () => {
          if (!listItems.length) return;
          blocks.push("<ul>" + listItems.map((item) => "<li>" + item + "</li>").join("") + "</ul>");
          listItems = [];
        };

        for (const rawLine of lines) {
          const line = applyInlineMarkdown(escapeHtml(rawLine.trim()));
          if (!line) {
            flushParagraph();
            flushList();
            continue;
          }
          if (line.startsWith("### ")) {
            flushParagraph();
            flushList();
            blocks.push("<h5>" + line.slice(4) + "</h5>");
            continue;
          }
          if (line.startsWith("## ")) {
            flushParagraph();
            flushList();
            blocks.push("<h4>" + line.slice(3) + "</h4>");
            continue;
          }
          if (line.startsWith("# ")) {
            flushParagraph();
            flushList();
            blocks.push("<h3>" + line.slice(2) + "</h3>");
            continue;
          }
          if (line.startsWith("- ")) {
            flushParagraph();
            listItems.push(line.slice(2));
            continue;
          }
          flushList();
          paragraph.push(line);
        }

        flushParagraph();
        flushList();
        return blocks.join("");
      };

      const AnswerCommentPopover = {
        name: "AnswerCommentPopover",
        props: {
          markdown: { type: String, required: true },
          isOpen: { type: Boolean, required: true },

      const ChooseCorrectAnswerTest = {
        name: "ChooseCorrectAnswerTest",
        components: { AnswerCommentPopover },
        props: {
          title: { type: String, default: "Выбери правильный ответ" },
          descriptionMarkdown: { type: String, default: "" },
          questions: { type: Array, required: true },
        },
        data() {
          return {
            selectedAnswers: {},
            checkMode: false,
            showAnswersMode: false,
            openCommentKey: "",
          };
        },
        computed: {
          renderedDescription() {
            return renderMarkdown(this.descriptionMarkdown || "");
          },
          totalQuestions() {
            return this.questions.length;
          },
          correctQuestionsCount() {
            return this.questions.reduce((acc, q) => (this.isQuestionCorrect(q) ? acc + 1 : acc), 0);
          },
        },
        methods: {
          makeCommentKey(questionId, optionId) {
            return questionId + "::" + optionId;
          },
          toggleComment(questionId, optionId) {
            const key = this.makeCommentKey(questionId, optionId);
            this.openCommentKey = this.openCommentKey === key ? "" : key;
          },
          isSelected(questionId, optionId) {
            return (this.selectedAnswers[questionId] || []).includes(optionId);
          },
          isCorrectOption(questionId, optionId) {
            const q = this.questions.find((it) => it.id === questionId);
            return q ? q.correctOptionIds.includes(optionId) : false;
          },
          toggleSelection(question, optionId) {
            this.checkMode = false;
            this.showAnswersMode = false;
            this.openCommentKey = "";
            if (!this.selectedAnswers[question.id]) this.selectedAnswers[question.id] = [];
            if (question.multiple) {
              const idx = this.selectedAnswers[question.id].indexOf(optionId);
              if (idx >= 0) this.selectedAnswers[question.id].splice(idx, 1);
              else this.selectedAnswers[question.id].push(optionId);
              return;
            }
            this.selectedAnswers[question.id] = [optionId];
          },
          isQuestionCorrect(question) {
            const selected = [...(this.selectedAnswers[question.id] || [])].sort();
            const correct = [...question.correctOptionIds].sort();
            return selected.length === correct.length && selected.every((id, i) => id === correct[i]);
          },
          checkAnswers() {
            this.checkMode = true;
          },
          showAnswers() {
            this.showAnswersMode = true;
            this.openCommentKey = "";
          },
          resetFeedback() {
            this.checkMode = false;
            this.showAnswersMode = false;
            this.openCommentKey = "";
          },
          restartTest() {
            this.resetFeedback();
            Object.keys(this.selectedAnswers).forEach((k) => delete this.selectedAnswers[k]);
          },
          getAnswerStateClass(questionId, optionId) {
            const question = this.questions.find((q) => q.id === questionId);
            if (!question) return "";
            if (this.showAnswersMode) {
              if (question.correctOptionIds.includes(optionId)) return "test__answer--correct";
              return this.isSelected(questionId, optionId) ? "test__answer--incorrect" : "";
            }
            if (!this.checkMode || !this.isSelected(questionId, optionId)) return "";
            return question.correctOptionIds.includes(optionId) ? "test__answer--correct" : "test__answer--incorrect";
          },
        },
        template: `
          <section class="test">
            <h2 class="test__title">{{ title }}</h2>
            <div v-if="descriptionMarkdown" class="test__description" v-html="renderedDescription"></div>
            <p v-if="checkMode" class="test__stats">Правильно: {{ correctQuestionsCount }} из {{ totalQuestions }}</p>

            <div v-for="question in questions" :key="question.id" class="test__question">
              <p class="test__question-text">{{ question.text }}</p>
              <ul class="test__answers">
                <li
                  v-for="option in question.options"
                  :key="option.id"
                  class="test__answer"
                  :class="getAnswerStateClass(question.id, option.id)"
                >
                  <label>
                    <input
                      :type="question.multiple ? 'checkbox' : 'radio'"
                      :name="question.id"
                      :checked="isSelected(question.id, option.id)"
                      @change="toggleSelection(question, option.id)"
                    />
                    <span class="test__answer-text">{{ option.text }}</span>
                    <span v-if="showAnswersMode && isCorrectOption(question.id, option.id)" class="test__correct-icon">✓</span>
                    <AnswerCommentPopover
                      v-if="showAnswersMode && option.commentMarkdown"
                      :markdown="option.commentMarkdown"
                      :is-open="openCommentKey === makeCommentKey(question.id, option.id)"
                      @toggle="toggleComment(question.id, option.id)"
                    />
                  </label>
                </li>
              </ul>
            </div>

            <div class="test__actions">
              <button class="test__check-btn" type="button" @click="checkAnswers">Проверить</button>
              <button class="test__secondary-btn" type="button" @click="showAnswers">Показать правильные ответы</button>
              <button class="test__secondary-btn" type="button" @click="resetFeedback">Сброс</button>
              <button class="test__secondary-btn" type="button" @click="restartTest">Начать заново</button>
            </div>
          </section>
        `,
      };

      const FillInTheBlankTest = {
        name: "FillInTheBlankTest",
        components: { AnswerCommentPopover },
        props: {
          title: { type: String, default: "Заполни пропуск" },
          descriptionMarkdown: { type: String, default: "" },
          texts: { type: Array, required: true },
        },
        data() {
          return {
            userAnswers: {},
            checkMode: false,
            showAnswersMode: false,
            openCommentKey: "",
          };
        },
        computed: {
          renderedDescription() {
            return renderMarkdown(this.descriptionMarkdown || "");
          },
          totalBlanksCount() {
            return this.texts.reduce((acc, t) => acc + t.blanks.length, 0);
          },
          correctBlanksCount() {
            return this.texts.reduce((acc, t) => {
              return (
                acc +
                t.blanks.reduce((bAcc, b) => (this.isBlankCorrect(t.id, b.id) ? bAcc + 1 : bAcc), 0)
              );
            }, 0);
          },
          segmentsByTextId() {
            return Object.fromEntries(this.texts.map((item) => [item.id, this.parseContent(item.content)]));
          },
        },
        methods: {
          keyOf(textId, blankId) {
            return textId + "::" + blankId;
          },
          normalize(value) {
            return String(value || "").trim().toLowerCase();
          },
          findBlank(textId, blankId) {
            const text = this.texts.find((t) => t.id === textId);
            return text ? text.blanks.find((b) => b.id === blankId) : undefined;
          },
          getUserAnswer(textId, blankId) {
            return this.userAnswers[this.keyOf(textId, blankId)] || "";
          },
          getBlankComment(textId, blankId) {
            const b = this.findBlank(textId, blankId);
            return b ? b.commentMarkdown || "" : "";
          },
          getCorrectAnswersText(textId, blankId) {
            const b = this.findBlank(textId, blankId);
            return b ? b.correctAnswers.join(" / ") : "";
          },
          getDisplayedAnswer(textId, blankId) {
            return this.showAnswersMode
              ? this.getCorrectAnswersText(textId, blankId)
              : this.getUserAnswer(textId, blankId);
          },
          isBlankCorrect(textId, blankId) {
            const blank = this.findBlank(textId, blankId);
            if (!blank) return false;
            const userValue = this.normalize(this.getUserAnswer(textId, blankId));
            return blank.correctAnswers.some((a) => this.normalize(a) === userValue);
          },
          parseContent(content) {
            const parts = content.split(/(\[\[[\w-]+\]\])/g);
            const segments = [];
            for (const part of parts) {
              if (!part) continue;
              const m = part.match(/^\[\[([\w-]+)\]\]$/);
              if (m) segments.push({ type: "blank", blankId: m[1] });
              else segments.push({ type: "text", value: part });
            }
            return segments;
          },
          getSegments(textId) {
            return this.segmentsByTextId[textId] || [];
          },
          onInputChange(textId, blankId, event) {
            this.checkMode = false;
            this.showAnswersMode = false;
            this.openCommentKey = "";
            this.userAnswers[this.keyOf(textId, blankId)] = event.target.value;
          },
          hasIncorrectUserAnswer(textId, blankId) {
            const answer = this.getUserAnswer(textId, blankId).trim();
            return answer.length > 0 && !this.isBlankCorrect(textId, blankId);
          },
          toggleComment(textId, blankId) {
            const key = this.keyOf(textId, blankId);
            this.openCommentKey = this.openCommentKey === key ? "" : key;
          },
          checkAnswers() {
            this.checkMode = true;
          },
          showAnswers() {
            this.showAnswersMode = true;
            this.openCommentKey = "";
          },
          resetFeedback() {
            this.checkMode = false;
            this.showAnswersMode = false;
            this.openCommentKey = "";
          },
          restartTest() {
            this.resetFeedback();
            Object.keys(this.userAnswers).forEach((k) => delete this.userAnswers[k]);
          },
          getBlankStateClass(textId, blankId) {
            if (!this.checkMode) return "";
            return this.isBlankCorrect(textId, blankId) ? "fill-test__blank--correct" : "fill-test__blank--incorrect";
          },
        },
        template: `
          <section class="fill-test">
            <h2>{{ title }}</h2>
            <div v-if="descriptionMarkdown" class="fill-test__description" v-html="renderedDescription"></div>
            <p v-if="checkMode" class="fill-test__stats">Правильно: {{ correctBlanksCount }} из {{ totalBlanksCount }}</p>

            <article v-for="textItem in texts" :key="textItem.id" class="fill-test__card">
              <h3 v-if="textItem.title">{{ textItem.title }}</h3>
              <p class="fill-test__text">
                <template v-for="(segment, index) in getSegments(textItem.id)" :key="textItem.id + '-' + index">
                  <span v-if="segment.type === 'text'">{{ segment.value }}</span>
                  <span v-else class="fill-test__blank" :class="getBlankStateClass(textItem.id, segment.blankId)">
                    <span
                      v-if="showAnswersMode && hasIncorrectUserAnswer(textItem.id, segment.blankId)"
                      class="fill-test__wrong-answer"
                    >
                      {{ getUserAnswer(textItem.id, segment.blankId) }}
                    </span>
                    <span
                      v-if="showAnswersMode"
                      class="fill-test__answer"
                      :title="getDisplayedAnswer(textItem.id, segment.blankId)"
                    >
                      {{ getDisplayedAnswer(textItem.id, segment.blankId) }}
                    </span>
                    <input
                      v-else
                      class="fill-test__input"
                      :value="getDisplayedAnswer(textItem.id, segment.blankId)"
                      :title="getDisplayedAnswer(textItem.id, segment.blankId)"
                      type="text"
                      @input="onInputChange(textItem.id, segment.blankId, $event)"
                    />
                    <AnswerCommentPopover
                      v-if="showAnswersMode && getBlankComment(textItem.id, segment.blankId)"
                      :markdown="getBlankComment(textItem.id, segment.blankId)"
                      :is-open="openCommentKey === keyOf(textItem.id, segment.blankId)"
                      @toggle="toggleComment(textItem.id, segment.blankId)"
                    />
                  </span>
                </template>
              </p>
            </article>

            <div class="fill-test__actions">
              <button class="fill-test__check-btn" type="button" @click="checkAnswers">Проверить</button>
              <button class="fill-test__secondary-btn" type="button" @click="showAnswers">Показать правильные ответы</button>
              <button class="fill-test__secondary-btn" type="button" @click="resetFeedback">Сброс</button>
              <button class="fill-test__secondary-btn" type="button" @click="restartTest">Начать заново</button>
            </div>
          </section>
        `,
      };

      const MatchPairsTest = {
        name: "MatchPairsTest",
        components: { AnswerCommentPopover },
        props: {
          title: { type: String, default: "Сопоставь одно с другим" },
          descriptionMarkdown: { type: String, default: "" },
          tasks: { type: Array, required: true },
        },
        data() {
          return {
            assignments: {},
            pendingOptionByTask: {},
            draggingTaskId: "",
            draggingOptionId: "",
            checkMode: false,
            showAnswersMode: false,
            openCommentKey: "",
          };
        },
        computed: {
          renderedDescription() {
            return renderMarkdown(this.descriptionMarkdown || "");
          },
          totalRowsCount() {
            return this.tasks.reduce((acc, t) => acc + t.rows.length, 0);
          },
          correctRowsCount() {
            return this.tasks.reduce((acc, t) => {
              return acc + t.rows.reduce((rAcc, r) => (this.isRowCorrect(t.id, r.id) ? rAcc + 1 : rAcc), 0);
            }, 0);
          },
        },
        methods: {
          makeKey(taskId, rowId) {
            return taskId + "::" + rowId;
          },
          findTask(taskId) {
            return this.tasks.find((t) => t.id === taskId);
          },
          findRow(taskId, rowId) {
            const task = this.findTask(taskId);
            return task ? task.rows.find((r) => r.id === rowId) : undefined;
          },
          findOption(taskId, optionId) {
            const task = this.findTask(taskId);
            return task ? task.options.find((o) => o.id === optionId) : undefined;
          },
          getPendingOption(taskId) {
            return this.pendingOptionByTask[taskId] || "";
          },
          getAvailableOptions(taskId) {
            const task = this.findTask(taskId);
            if (!task) return [];
            const assigned = new Set(task.rows.map((r) => this.assignments[this.makeKey(taskId, r.id)]).filter(Boolean));
            return task.options.filter((o) => !assigned.has(o.id));
          },
          assignOptionToRow(taskId, rowId, optionId) {
            this.checkMode = false;
            this.showAnswersMode = false;
            this.openCommentKey = "";
            const task = this.findTask(taskId);
            if (!task) return;
            task.rows.forEach((row) => {
              if (this.assignments[this.makeKey(taskId, row.id)] === optionId) {
                delete this.assignments[this.makeKey(taskId, row.id)];
              }
            });
            this.assignments[this.makeKey(taskId, rowId)] = optionId;
            this.pendingOptionByTask[taskId] = "";
          },
          onAnswerClick(taskId, optionId) {
            this.pendingOptionByTask[taskId] = this.pendingOptionByTask[taskId] === optionId ? "" : optionId;
          },
          onDropzoneClick(taskId, rowId) {
            const optionId = this.getPendingOption(taskId);
            if (optionId) this.assignOptionToRow(taskId, rowId, optionId);
          },
          onAnswerDragStart(taskId, optionId, event) {
            this.draggingTaskId = taskId;
            this.draggingOptionId = optionId;
            if (event.dataTransfer) event.dataTransfer.setData("text/plain", taskId + "::" + optionId);
          },
          onRowDrop(taskId, rowId, event) {
            const payload = event.dataTransfer ? event.dataTransfer.getData("text/plain") : "";
            const parts = payload.split("::");
            const payloadTaskId = parts[0] || "";
            const payloadOptionId = parts[1] || "";
            const sourceTaskId = payloadTaskId || this.draggingTaskId;
            const optionId = payloadOptionId || this.draggingOptionId;
            if (sourceTaskId === taskId && optionId) this.assignOptionToRow(taskId, rowId, optionId);
          },
          onAnswerTouchStart(taskId, optionId) {
            this.draggingTaskId = taskId;
            this.draggingOptionId = optionId;
          },
          onAnswerTouchEnd(event) {
            const touch = event.changedTouches[0];
            if (!touch) return;
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            const dropzone = target && target.closest ? target.closest(".match-test__dropzone") : null;
            if (!dropzone) return;
            const taskId = dropzone.dataset.taskId || "";
            const rowId = dropzone.dataset.rowId || "";
            if (taskId && rowId && taskId === this.draggingTaskId) {
              this.assignOptionToRow(taskId, rowId, this.draggingOptionId);
            }
          },
          isRowCorrect(taskId, rowId) {
            const row = this.findRow(taskId, rowId);
            return !!row && this.assignments[this.makeKey(taskId, rowId)] === row.correctOptionId;
          },
          hasWrongAssignment(taskId, rowId) {
            return Boolean(this.assignments[this.makeKey(taskId, rowId)]) && !this.isRowCorrect(taskId, rowId);
          },
          getAssignedText(taskId, rowId) {
            const assigned = this.assignments[this.makeKey(taskId, rowId)];
            return assigned ? (this.findOption(taskId, assigned) || {}).text || "" : "";
          },
          getCorrectText(taskId, rowId) {
            const row = this.findRow(taskId, rowId);
            if (!row) return "Перетащите ответ сюда";
            return (this.findOption(taskId, row.correctOptionId) || {}).text || "Перетащите ответ сюда";
          },
          getDisplayedText(taskId, rowId) {
            if (this.showAnswersMode) return this.getCorrectText(taskId, rowId);
            return this.getAssignedText(taskId, rowId) || "Перетащите ответ сюда";
          },
          isPlaceholder(taskId, rowId) {
            return !this.showAnswersMode && !this.getAssignedText(taskId, rowId);
          },
          getDropzoneClass(taskId, rowId) {
            if (this.showAnswersMode) return "match-test__dropzone--correct";
            if (!this.checkMode) return "";
            if (!this.assignments[this.makeKey(taskId, rowId)]) return "match-test__dropzone--incorrect";
            return this.isRowCorrect(taskId, rowId)
              ? "match-test__dropzone--correct"
              : "match-test__dropzone--incorrect";
          },
          checkAnswers() {
            this.checkMode = true;
          },
          toggleComment(taskId, rowId) {
            const key = this.makeKey(taskId, rowId);
            this.openCommentKey = this.openCommentKey === key ? "" : key;
          },
          showAnswers() {
            this.showAnswersMode = true;
            this.openCommentKey = "";
          },
          resetFeedback() {
            this.checkMode = false;
            this.showAnswersMode = false;
            this.openCommentKey = "";
          },
          restartTest() {
            this.resetFeedback();
            Object.keys(this.assignments).forEach((k) => delete this.assignments[k]);
            Object.keys(this.pendingOptionByTask).forEach((k) => delete this.pendingOptionByTask[k]);
          },
        },
        template: `
          <section class="match-test">
            <h2>{{ title }}</h2>
            <div v-if="descriptionMarkdown" class="match-test__description" v-html="renderedDescription"></div>
            <p v-if="checkMode" class="match-test__stats">Правильно: {{ correctRowsCount }} из {{ totalRowsCount }}</p>

            <article v-for="task in tasks" :key="task.id" class="match-test__task">
              <h3 v-if="task.title">{{ task.title }}</h3>
              <table class="match-test__table">
                <thead>
                  <tr>
                    <th>{{ task.leftColumnTitle || 'Предложение' }}</th>
                    <th>{{ task.rightColumnTitle || 'Сопоставление' }}</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="row in task.rows" :key="row.id">
                    <td>{{ row.prompt }}</td>
                    <td>
                      <div
                        class="match-test__dropzone"
                        :class="getDropzoneClass(task.id, row.id)"
                        :data-task-id="task.id"
                        :data-row-id="row.id"
                        @dragover.prevent
                        @drop="onRowDrop(task.id, row.id, $event)"
                        @click="onDropzoneClick(task.id, row.id)"
                      >
                        <span
                          v-if="showAnswersMode && hasWrongAssignment(task.id, row.id)"
                          class="match-test__wrong-chip"
                        >
                          {{ getAssignedText(task.id, row.id) }}
                        </span>
                        <span class="match-test__chip" :class="{ 'match-test__chip--placeholder': isPlaceholder(task.id, row.id) }">
                          {{ getDisplayedText(task.id, row.id) }}
                        </span>
                        <AnswerCommentPopover
                          v-if="showAnswersMode && row.commentMarkdown"
                          :markdown="row.commentMarkdown"
                          :is-open="openCommentKey === makeKey(task.id, row.id)"
                          @toggle="toggleComment(task.id, row.id)"
                        />
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>

              <div class="match-test__bank">
                <p class="match-test__bank-title">Ответы:</p>
                <div class="match-test__answers">
                  <button
                    v-for="option in getAvailableOptions(task.id)"
                    :key="option.id"
                    class="match-test__answer-chip"
                    :class="{ 'match-test__answer-chip--active': getPendingOption(task.id) === option.id }"
                    type="button"
                    draggable="true"
                    @click="onAnswerClick(task.id, option.id)"
                    @dragstart="onAnswerDragStart(task.id, option.id, $event)"
                    @touchstart.prevent="onAnswerTouchStart(task.id, option.id)"
                    @touchend.prevent="onAnswerTouchEnd($event)"
                  >
                    {{ option.text }}
                  </button>
                </div>
              </div>
            </article>

            <div class="match-test__actions">
              <button class="match-test__check-btn" type="button" @click="checkAnswers">Проверить</button>
              <button class="match-test__secondary-btn" type="button" @click="showAnswers">Показать правильные ответы</button>
              <button class="match-test__secondary-btn" type="button" @click="resetFeedback">Сброс</button>
              <button class="match-test__secondary-btn" type="button" @click="restartTest">Начать заново</button>
            </div>
          </section>
        `,
      };

      const testComponentMap = {
        "choose-correct-answer": ChooseCorrectAnswerTest,
        "fill-in-the-blank": FillInTheBlankTest,
        "match-pairs": MatchPairsTest,
      };

      const TestSuiteContainer = {
        name: "TestSuiteContainer",
        props: {
          items: { type: Array, required: true },
        },
        methods: {
          getComponent(type) {
            return testComponentMap[type];
          },
          getComponentProps(item) {
            if (item.componentType === "choose-correct-answer") {
              return { title: item.title, descriptionMarkdown: item.descriptionMarkdown, questions: item.questions };
            }
            if (item.componentType === "fill-in-the-blank") {
              return { title: item.title, descriptionMarkdown: item.descriptionMarkdown, texts: item.texts };
            }
            return { title: item.title, descriptionMarkdown: item.descriptionMarkdown, tasks: item.tasks };
          },
        },
        template: `
          <section class="suite">
            <article v-for="item in items" :key="item.id" class="suite__item">
              <component :is="getComponent(item.componentType)" v-bind="getComponentProps(item)" />
            </article>
          </section>
        `,
      };

      const suiteData = JSON.parse(document.getElementById("suite-data").textContent);

      createApp({
        components: { TestSuiteContainer },
        data() {
          return { items: suiteData };
        },
        template: `<TestSuiteContainer :items="items" />`,
      }).mount("#app");
    </script>
  </body>
</html>
